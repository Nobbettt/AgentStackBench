# Fork note: Added by Norbert Laszlo on 2026-03-22.
# Summary of changes: publish a unified GitHub Pages artifact containing the React showcase and nested Sphinx docs.

name: Pages

on:
  push:
    branches: ["main"]
    paths:
      - "docs/**"
      - "frontend/**"
      - "site-data/**"
      - ".github/workflows/pages.yml"
      - "requirements.txt"
      - "docs/requirements.txt"
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-22.04
    env:
      VITE_BASE_PATH: /${{ github.event.repository.name }}/
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r docs/requirements.txt
          python -m pip install -r requirements.txt

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Build showcase
        run: npm run build --prefix frontend

      - name: Build Sphinx docs
        run: make -C docs html

      - name: Merge docs into Pages artifact
        run: |
          mkdir -p frontend/dist/docs
          cp -R docs/build/html/. frontend/dist/docs/

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    needs: build
    runs-on: ubuntu-22.04
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
